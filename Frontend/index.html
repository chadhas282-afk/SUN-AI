<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SUN AI</title>
    <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link id="prism-theme" href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css"
        rel="stylesheet" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&family=Fira+Code:wght@400;500&display=swap');

        :root{
            --accent: #22d3ee;
            --bg: #030303;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.08);
            --text: #f1f5f9;
        }
        .light-theme{
            --bg: #f8fafc;
            --glass: rgba(0, 0, 0, 0.03);
            --border: rgba(0, 0, 0, 0.1);
            --text: #0f172a;
        }
        body{
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg)!important;
            color: var(--text);
            transition: all 0.3s ease;
            margin: 0;
            display: flex;
            height: 100vh;
        }
        .glass{
            background: var(--glass);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border);
        }
        .message-bubble{
            word-wrap: break-word;
            overflow-wrap: break-word;
            word-break: break-word;
            white-space: pre-wrap;
        }
        .prose {
            font-size: 0.9rem !important;
            line-height: 1.5 !important;
        }
        
    </style>
</head>
<body>
    
</body>
</html>
