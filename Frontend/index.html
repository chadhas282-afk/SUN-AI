<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lumina Elite | AI Terminal</title>
    <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&family=Fira+Code:wght@400;500&display=swap');

        :root {
            --accent: #22d3ee;
            --bg: #030303;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.08);
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg);
            color: #f1f5f9;
            height: 100vh;
            display: flex;
            overflow: hidden;
            margin: 0;
        }

        .glass {
            background: var(--glass);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border);
        }

        .custom-scrollbar::-webkit-scrollbar {
            width: 3px;
        }

        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: rgba(34, 211, 238, 0.2);
            border-radius: 10px;
        }

        .prose pre {
            background: #000 !important;
            border: 1px solid var(--border);
            padding: 12px;
            border-radius: 8px;
            margin: 8px 0;
            overflow-x: auto;
        }

        @media (max-width: 1024px) {
            .mobile-sidebar-active {
                transform: translateX(0) !important;
            }
        }

        input[type="text"] {
            font-size: 16px !important;
        }

        /* Prevents iOS zoom */
    </style>
</head>

<body class="flex">

    <div id="sidebar-overlay" onclick="toggleSidebar()"
        class="fixed inset-0 bg-black/60 z-30 hidden lg:hidden backdrop-blur-sm"></div>

    <aside id="sidebar"
        class="fixed inset-y-0 left-0 w-72 glass flex flex-col z-40 -translate-x-full transition-transform duration-300 lg:relative lg:translate-x-0 border-r border-white/5 shrink-0">
        <div class="p-5 space-y-4">
            <div class="flex items-center justify-between">
                <h1 class="text-lg font-extrabold tracking-tighter text-cyan-400 flex items-center gap-2">
                    <i data-lucide="zap" class="w-5 h-5"></i> LUMINA
                </h1>
                <button onclick="toggleSidebar()" class="lg:hidden text-slate-400"><i data-lucide="x"
                        class="w-6 h-6"></i></button>
            </div>
            <button onclick="createNewChat(); if(window.innerWidth < 1024) toggleSidebar();"
                class="w-full py-2.5 bg-cyan-500 text-white rounded-lg font-bold text-xs flex items-center justify-center gap-2">
                <i data-lucide="plus" class="w-4 h-4"></i> NEW SESSION
            </button>
        </div>
        <div id="history-list" class="flex-1 overflow-y-auto px-3 space-y-0.5 custom-scrollbar"></div>
    </aside>

    <div class="flex-1 flex flex-col min-w-0 h-full relative">
        <header class="flex items-center justify-between px-4 lg:px-8 py-3 border-b glass">
            <div class="flex items-center gap-3">
                <button onclick="toggleSidebar()" class="lg:hidden p-1.5 hover:bg-white/5 rounded-md text-cyan-400"><i
                        data-lucide="menu" class="w-6 h-6"></i></button>
                <div class="text-[10px] font-mono text-green-500 flex items-center gap-2">
                    <span class="w-1.5 h-1.5 rounded-full bg-green-500 animate-pulse"></span> SYSTEM_READY
                </div>
            </div>
            <label class="hidden sm:flex text-[9px] text-slate-500 uppercase font-bold items-center gap-2">
                <input type="checkbox" id="scroll-lock" checked class="accent-cyan-500"> Auto-Scroll
            </label>
        </header>

        <main id="chat-container" class="flex-1 overflow-y-auto p-4 lg:p-6 space-y-4 custom-scrollbar w-full"></main>

        <footer class="p-4 lg:p-5 glass border-t">
            <div class="max-w-4xl mx-auto flex gap-2">
                <input type="text" id="user-input" placeholder="Ask Lumina anything..."
                    class="flex-1 bg-white/5 border border-white/10 rounded-xl py-3 px-4 text-sm focus:outline-none focus:border-cyan-500/50"
                    onkeydown="if(event.key === 'Enter') sendMessage()">
                <button id="send-btn" onclick="sendMessage()"
                    class="bg-cyan-500 text-white px-5 rounded-xl hover:scale-105 transition-all">
                    <i data-lucide="arrow-up" class="w-5 h-5"></i>
                </button>
                <button id="stop-btn" onclick="stopGeneration()"
                    class="hidden bg-red-500 text-white px-4 rounded-xl font-bold text-[10px]">STOP</button>
            </div>
        </footer>
    </div>

    <script>
        lucide.createIcons();
        const chatContainer = document.getElementById('chat-container');
        const userInput = document.getElementById('user-input');
        const stopBtn = document.getElementById('stop-btn');
        const scrollLock = document.getElementById('scroll-lock');
        let currentChatId = null, abortController = null;

        marked.setOptions({ gfm: true, breaks: true });

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('mobile-sidebar-active');
            document.getElementById('sidebar-overlay').classList.toggle('hidden');
        }

        async function sendMessage() {
            const prompt = userInput.value.trim(); if (!prompt) return;
            if (chatContainer.querySelector('.opacity-10')) chatContainer.innerHTML = '';
            if (!currentChatId) currentChatId = Date.now().toString();

            userInput.value = ''; appendMessage('user', prompt);
            stopBtn.classList.remove('hidden');
            abortController = new AbortController();

            const aiId = 'ai-' + Date.now();
            appendMessage('ai', '', aiId);
            const el = document.getElementById(aiId);

            let fullText = "", displayBuffer = "", isFinished = false;

            const typeWriter = setInterval(() => {
                if (displayBuffer.length > 0) {
                    fullText += displayBuffer.charAt(0);
                    displayBuffer = displayBuffer.substring(1);
                    el.innerHTML = marked.parse(fullText);
                    Prism.highlightAllUnder(el);
                    if (scrollLock.checked) chatContainer.scrollTop = chatContainer.scrollHeight;
                } else if (isFinished) {
                    clearInterval(typeWriter);
                    stopBtn.classList.add('hidden');
                    saveToHistory(prompt, fullText);
                }
            }, 12);

            try {
                const res = await fetch('http://localhost:8000/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt }),
                    signal: abortController.signal
                });
                const reader = res.body.getReader();
                const decoder = new TextDecoder();
                while (true) {
                    const { value, done } = await reader.read();
                    if (done) break;
                    const lines = decoder.decode(value).split('\n');
                    for (const line of lines) {
                        if (line.startsWith('data: ')) {
                            const data = JSON.parse(line.slice(6));
                            if (data.text) displayBuffer += data.text;
                        }
                    }
                }
            } catch (e) { if (e.name !== 'AbortError') el.innerText = "Error: Check backend."; }
            finally { isFinished = true; }
        }

        function appendMessage(role, content, id = null) {
            const div = document.createElement('div');
            div.className = `flex ${role === 'user' ? 'justify-end' : 'justify-start'} w-full mb-4 px-2`;
            div.innerHTML = `
                <div class="${role === 'user' ? 'bg-cyan-600 text-white' : 'glass text-slate-300'} px-4 py-2.5 rounded-2xl max-w-[95%] lg:max-w-[85%] prose prose-invert overflow-hidden">
                    <div id="${id || ''}">${role === 'user' ? content : marked.parse(content)}</div>
                </div>`;
            chatContainer.appendChild(div);
            if (scrollLock.checked) chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function createNewChat() {
            currentChatId = Date.now().toString();
            chatContainer.innerHTML = '<div class="flex flex-col items-center justify-center h-full opacity-10"><i data-lucide="zap" class="w-12 h-12 text-cyan-500"></i></div>';
            lucide.createIcons();
        }

        function stopGeneration() { if (abortController) abortController.abort(); }
        const getHistory = () => JSON.parse(localStorage.getItem('lumina_history') || '[]');
        function saveToHistory(p, r) {
            const h = getHistory(); let c = h.find(x => x.id === currentChatId);
            if (!c) { c = { id: currentChatId, title: p.slice(0, 20).toUpperCase(), messages: [] }; h.push(c); }
            c.messages.push({ role: 'user', content: p }, { role: 'ai', content: r });
            localStorage.setItem('lumina_history', JSON.stringify(h));
        }
        createNewChat();
    </script>
</body>

</html>
