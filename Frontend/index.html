<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SUN AI</title>
    <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link id="prism-theme" href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css"
        rel="stylesheet" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&family=Fira+Code:wght@400;500&display=swap');

        :root{
            --accent: #22d3ee;
            --bg: #030303;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.08);
            --text: #f1f5f9;
        }
        .light-theme{
            --bg: #f8fafc;
            --glass: rgba(0, 0, 0, 0.03);
            --border: rgba(0, 0, 0, 0.1);
            --text: #0f172a;
        }
        body{
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg)!important;
            color: var(--text);
            transition: all 0.3s ease;
            margin: 0;
            display: flex;
            height: 100vh;
        }
        .glass{
            background: var(--glass);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border);
        }
        .message-bubble{
            word-wrap: break-word;
            overflow-wrap: break-word;
            word-break: break-word;
            white-space: pre-wrap;
        }
        .prose {
            font-size: 0.9rem !important;
            line-height: 1.5 !important;
        }
        .prose p{
            margin-top: 0.5rem !important;
            margin-bottom: 0.5rem !important;
        }
        .prose pre{
            background: #000 !important;
            padding: 1rem !important;
            border-radius: 10px;
            margin: 0.75rem 0 !important;
            overflow-x: auto;
            border: 1px solid var(--border);
            max-width: 100%;
        }
        .action-btn {
            position: absolute;
            top: 6px;
            font-size: 9px;
            padding: 3px 6px;
            border-radius: 5px;
            background: rgba(255, 255, 255, 0.1);
            color: #94a3b8;
            cursor: pointer;
            z-index: 20;
            border: none;
        }
        .action-btn:hover {
            background: var(--accent);
            color: #000;
        }
        .sidebar-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px;
            border-radius: 10px;
            margin-bottom: 2px;
            cursor: pointer;
            transition: 0.1s;
            font-size: 11px;
            font-weight: 600;
        }
        .sidebar-active {
            background: rgba(34, 211, 238, 0.1) !important;
            border-left: 3px solid var(--accent);
            color: var(--accent);
        }
         .custom-scrollbar::-webkit-scrollbar {
            width: 3px;
        }

        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: rgba(128, 128, 128, 0.2);
            border-radius: 10px;
        }
    </style>
</head>
<body class="flex">
    <aside class="w-72 glass flex flex-col h-full z-20 border-r border-white/5 shrink-0">
        <div class="p-5 space-y-4">
            <h1 class="text-lg font-extrabold tracking-tighter text-cyan-400 flex items-center gap-2"><i data-lucide="zap" class="w-5 h-5"></i>SUN AI
            </h1>
             <button onclick="createNewChat()"
                class="w-full py-2.5 bg-cyan-500 text-white rounded-lg font-bold text-xs flex items-center justify-center gap-2 hover:opacity-90 transition-all">
                <i data-lucide="plus" class="w-4 h-4"></i> NEW SESSION
            </button>
             <input type="text" id="search-history" placeholder="Search..." oninput="renderSidebar()"
                class="w-full bg-white/5 border border-white/10 rounded-lg py-1.5 px-3 text-[11px] focus:outline-none focus:border-cyan-500/50">
        </div>
        <div id="history-list" class="flex-1 overflow-y-auto px-3 space-y-0.5 custom-scrollbar"></div>

        <div class="p-4 border-t border-white/5 space-y-2">
             <button onclick="toggleTheme()"
                class="w-full py-2 rounded-lg border border-white/10 flex items-center justify-center gap-2 text-[10px] font-bold uppercase tracking-wider hover:bg-white/5">
                <i data-lucide="sun" id="theme-icon" class="w-3.5 h-3.5 text-orange-400"></i> <span
                    id="theme-text">Light Mode</span>
            </button>
        </div>
    </aside>
</body>
</html>
